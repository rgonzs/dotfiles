# Fondo general de la barra de tabs (claro)
tab_bar_background #f5f5f5

# Tab activa (la que estás usando)
active_tab_foreground   #ffffff
active_tab_background   #4a90e2
active_tab_font_style   bold

# Tabs inactivas
inactive_tab_foreground #555555
inactive_tab_background #e0e0e0
inactive_tab_font_style normal

# Borde / separador (importante en powerline)
tab_separator " "

# Opcional: campana (bell)
bell_on_tab_background  #ffcc00
bell_on_tab_foreground  #000000
